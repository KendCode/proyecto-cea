<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <title>Login</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

</head>

<body>

<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card p-4">

        <h3 class="text-center mb-4">
          Iniciar Sesión
        </h3>

        <form id="formLogin">

          <input
            type="text"
            id="usuario"
            class="form-control mb-3"
            placeholder="Usuario"
            required
          >

          <input
            type="password"
            id="password"
            class="form-control mb-3"
            placeholder="Contraseña"
            required
          >

          <button
            class="btn btn-primary w-100"
          >
            Ingresar
          </button>

        </form>

      </div>

    </div>

  </div>

</div>

<script
  type="module"
  src="../../controllers/authController.js"
></script>

</body>

</html>
