<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEA — Estudiantes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>

<body>
  <script src="../../assets/js/sidebar.js"></script>
  <script>renderLayout({ title: 'Estudiantes', subtitle: 'Gestión de estudiantes inscritos', activeLink: 'estudiantes' });</script>

  <div id="main">
    <div class="page-content">

      <!-- Stats -->
      <div class="row g-3 mb-4"
        style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px">
        <div class="stat-card">
          <div class="icon-wrap ic-blue"><i class="bi bi-person-badge-fill"></i></div>
          <div class="stat-value" id="totalEst">—</div>
          <div class="stat-label">Total Estudiantes</div>
          <span class="stat-change up"><i class="bi bi-arrow-up-short"></i> Gestión 2026</span>
        </div>
        <div class="stat-card">
          <div class="icon-wrap ic-green"><i class="bi bi-check-circle-fill"></i></div>
          <div class="stat-value" id="activos">—</div>
          <div class="stat-label">Activos</div>
        </div>
        <div class="stat-card">
          <div class="icon-wrap ic-purple"><i class="bi bi-building"></i></div>
          <div class="stat-value" id="carreras">—</div>
          <div class="stat-label">Carreras</div>
        </div>
        <div class="stat-card">
          <div class="icon-wrap ic-amber"><i class="bi bi-layers-fill"></i></div>
          <div class="stat-value" id="niveles">—</div>
          <div class="stat-label">Niveles</div>
        </div>
      </div>

      <!-- Tabla -->
      <div class="panel-card">
        <div class="section-header">
          <div>
            <div class="section-title">Lista de Estudiantes</div>
            <div class="section-sub">Todos los estudiantes registrados en el sistema</div>
          </div>
          <div style="display:flex;gap:10px;align-items:center">
            <div class="filters-bar">
              <select class="filter-select" id="filtroCarrera" onchange="filtrarTabla()">
                <option value="">Todas las carreras</option>
              </select>
              <select class="filter-select" id="filtroNivel" onchange="filtrarTabla()">
                <option value="">Todos los niveles</option>
              </select>
              <select class="filter-select" id="filtroGestion" onchange="filtrarTabla()">
                <option value="">Toda gestión</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
              </select>
            </div>
            <button class="btn btn-primary" onclick="abrirModal()">
              <i class="bi bi-plus-lg"></i> Nuevo Estudiante
            </button>
          </div>
        </div>

        <div style="overflow-x:auto">
          <table class="data-table" id="tablaEstudiantes">
            <thead>
              <tr>
                <th>#</th>
                <th>Estudiante</th>
                <th>CI</th>
                <th>Usuario</th>
                <th>Carrera</th>
                <th>Nivel</th>
                <th>Gestión</th>
                <th>Estado</th>
                <!-- <th>Acciones</th> -->
              </tr>
            </thead>
            <tbody id="tbodyEst">
              <tr>
                <td colspan="9" style="text-align:center;padding:40px;color:var(--txt-muted)"><i
                    class="bi bi-hourglass-split"></i> Cargando...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px">
          <span style="font-size:12px;color:var(--txt-muted)" id="paginaInfo">—</span>
          <div class="pagination" id="paginacion"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Nuevo/Editar Estudiante -->
  <div class="modal-backdrop" id="modalEstudiante">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <div class="modal-title" id="modalTitulo">Nuevo Estudiante</div>
        <button class="modal-close" onclick="cerrarModal()"><i class="bi bi-x-lg"></i></button>
      </div>

      <div
        style="color:var(--txt-muted);font-size:12px;margin-bottom:18px;background:var(--bg-elevated);border-radius:var(--radius-sm);padding:10px 14px">
        <i class="bi bi-info-circle"></i> El estudiante debe tener primero un <strong
          style="color:var(--txt-primary)">usuario</strong> creado en el sistema.
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Estudiante</label>

          <select class="form-control" id="fUsuarioId">
            <option value="">
              Seleccionar estudiante...
            </option>
          </select>

        </div>
        <div class="form-group">
          <label class="form-label">Gestión</label>
          <input type="text" class="form-control" id="fGestion" placeholder="2026" value="2026">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Carrera</label>
          <select class="form-control" id="fCarrera">
            <option value="">Seleccionar carrera...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Nivel</label>
          <select class="form-control" id="fNivel">
            <option value="">Seleccionar nivel...</option>
          </select>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarEstudiante()"><i class="bi bi-floppy-fill"></i> Guardar</button>
      </div>
    </div>
  </div>
  <script type="module" src="../../controllers/estudiantesController.js"></script>
</body>

</html>
