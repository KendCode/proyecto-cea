<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>CEA — Carreras</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="../../assets/css/adminCarreras.css">

</head>

<body>

  <!-- SIDEBAR -->
  <script src="../../assets/js/sidebar.js"></script>

  <script>

    renderLayout({

      title: 'Carreras',

      subtitle: 'Gestión de carreras técnicas',

      activeLink: 'carreras'

    });

  </script>

  <!-- MAIN -->
  <div id="main">

    <div class="page-content">

      <!-- ===================================== -->
      <!-- STATS -->
      <!-- ===================================== -->

      <div class="row g-3 mb-4"
        style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px">

        <!-- TOTAL -->

        <div class="stat-card">

          <div class="icon-wrap ic-blue">

            <i class="bi bi-collection-fill"></i>

          </div>

          <div
            class="stat-value"
            id="totalCarreras">

            —

          </div>

          <div class="stat-label">

            Total Carreras

          </div>

          <span class="stat-change up">

            <i class="bi bi-arrow-up-short"></i>

            Sistema Académico

          </span>

        </div>

        <!-- ACTIVAS -->

        <div class="stat-card">

          <div class="icon-wrap ic-green">

            <i class="bi bi-check-circle-fill"></i>

          </div>

          <div
            class="stat-value"
            id="activas">

            —

          </div>

          <div class="stat-label">

            Activas

          </div>

        </div>

        <!-- INACTIVAS -->

        <div class="stat-card">

          <div class="icon-wrap ic-red">

            <i class="bi bi-x-circle-fill"></i>

          </div>

          <div
            class="stat-value"
            id="inactivas">

            —

          </div>

          <div class="stat-label">

            Inactivas

          </div>

        </div>

        <!-- SIGLAS -->

        <div class="stat-card">

          <div class="icon-wrap ic-purple">

            <i class="bi bi-tag-fill"></i>

          </div>

          <div
            class="stat-value"
            id="siglasTotal">

            —

          </div>

          <div class="stat-label">

            Siglas Registradas

          </div>

        </div>

      </div>

      <!-- ===================================== -->
      <!-- TABLA -->
      <!-- ===================================== -->

      <div class="panel-card">

        <!-- HEADER -->

        <div class="section-header">

          <div>

            <div class="section-title">

              Lista de Carreras

            </div>

            <div class="section-sub">

              Todas las carreras registradas dentro del sistema

            </div>

          </div>

          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">

            <!-- BUSCADOR -->

            <div class="filters-bar">

              <input
                type="text"
                id="buscarCarrera"
                class="filter-select"
                placeholder="Buscar carrera..."
                onkeyup="filtrarCarreras()">

            </div>

            <!-- BOTON -->

            <button
              class="btn btn-primary"
              onclick="abrirNuevo()">

              <i class="bi bi-plus-lg"></i>

              Nueva Carrera

            </button>

          </div>

        </div>

        <!-- TABLE -->

        <div style="overflow-x:auto">

          <table
            class="data-table"
            id="tablaCarreras">

            <thead>

              <tr>

                <th>#</th>

                <th>Carrera</th>

                <th>Sigla</th>

                <th>Estado</th>

                <th class="text-center">

                  Acciones

                </th>

              </tr>

            </thead>

            <tbody id="tbodyCarreras">

              <tr>

                <td
                  colspan="5"
                  style="text-align:center;padding:40px;color:var(--txt-muted)">

                  <i class="bi bi-hourglass-split"></i>

                  Cargando carreras...

                </td>

              </tr>

            </tbody>

          </table>

        </div>

        <!-- PAGINACION -->

        <div
          style="display:flex;align-items:center;justify-content:space-between;margin-top:16px">

          <span
            style="font-size:12px;color:var(--txt-muted)"
            id="paginaInfo">

            —

          </span>

          <div
            class="pagination"
            id="paginacion">

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- ===================================== -->
  <!-- MODAL -->
  <!-- ===================================== -->

  <div
    class="modal-backdrop"
    id="modalCarrera">

    <div
      class="modal"
      style="max-width:580px">

      <!-- HEADER -->

      <div class="modal-header">

        <div
          class="modal-title"
          id="tituloModal">

          Nueva Carrera

        </div>

        <button
          class="modal-close"
          onclick="cerrarModal()">

          <i class="bi bi-x-lg"></i>

        </button>

      </div>

      <!-- INFO -->

      <div
        style="color:var(--txt-muted);font-size:12px;margin-bottom:18px;background:var(--bg-elevated);border-radius:var(--radius-sm);padding:10px 14px">

        <i class="bi bi-info-circle"></i>

        Complete la información de la carrera técnica.

      </div>

      <!-- HIDDEN -->

      <input
        type="hidden"
        id="idCarrera" />

      <!-- FORM -->

      <div class="form-row">

        <!-- NOMBRE -->

        <div class="form-group">

          <label class="form-label">

            Nombre de la Carrera

          </label>

          <input
            type="text"
            class="form-control"
            id="fNombre"
            placeholder="Ej: Sistemas Informáticos">

        </div>

      </div>

      <div class="form-row">

        <!-- SIGLA -->

        <div class="form-group">

          <label class="form-label">

            Sigla

          </label>

          <input
            type="text"
            class="form-control"
            id="fSigla"
            maxlength="10"
            placeholder="Ej: SIS">

        </div>

      </div>

      <!-- FOOTER -->

      <div class="modal-footer">

        <button
          class="btn btn-ghost"
          onclick="cerrarModal()">

          Cancelar

        </button>

        <button
          class="btn btn-primary"
          onclick="guardarCarrera()">

          <i class="bi bi-floppy-fill"></i>

          Guardar

        </button>

      </div>

    </div>

  </div>

  <!-- CONTROLLER -->

  <script
    type="module"
    src="../../controllers/carrerasController.js"></script>

</body>

</html>
