<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CEA — Niveles</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>

<body>

  <script src="../../assets/js/sidebar.js"></script>

  <script>
    renderLayout({
      title: 'Niveles',
      subtitle: 'Gestión de niveles académicos',
      activeLink: 'niveles'
    });
  </script>

  <div id="main">
    <div class="page-content">

      <!-- STATS -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:24px">

        <div class="stat-card">
          <div class="icon-wrap ic-blue">
            <i class="bi bi-layers-fill"></i>
          </div>

          <div class="stat-value" id="totalNiveles">0</div>

          <div class="stat-label">
            Total Niveles
          </div>
        </div>

        <div class="stat-card">
          <div class="icon-wrap ic-green">
            <i class="bi bi-check-circle-fill"></i>
          </div>

          <div class="stat-value" id="nivelesActivos">0</div>

          <div class="stat-label">
            Activos
          </div>
        </div>

      </div>

      <!-- PANEL -->
      <div class="panel-card">

        <div class="section-header">

          <div>
            <div class="section-title">
              Lista de Niveles
            </div>

            <div class="section-sub">
              Administración de niveles académicos
            </div>
          </div>

          <button class="btn btn-primary" onclick="abrirModal()">
            <i class="bi bi-plus-lg"></i>
            Nuevo Nivel
          </button>

        </div>

        <!-- TABLA -->
        <div style="overflow-x:auto">

          <table class="data-table">

            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Sigla</th>
                <th>Orden</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>

            <tbody id="tbodyNiveles"></tbody>

          </table>

        </div>

      </div>

    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-backdrop" id="modalNivel">

    <div class="modal" style="max-width:520px">

      <div class="modal-header">

        <div class="modal-title" id="modalTitulo">
          Nuevo Nivel
        </div>

        <button class="modal-close" onclick="cerrarModal()">
          <i class="bi bi-x-lg"></i>
        </button>

      </div>

      <input type="hidden" id="editId">

      <div class="form-group">
        <label class="form-label">Nombre</label>

        <input
          type="text"
          class="form-control"
          id="fNombre"
          placeholder="Técnico Básico"
        >
      </div>

      <div class="form-row">

        <div class="form-group">
          <label class="form-label">Sigla</label>

          <input
            type="text"
            class="form-control"
            id="fSigla"
            placeholder="TB"
          >
        </div>

        <div class="form-group">
          <label class="form-label">Orden</label>

          <input
            type="number"
            class="form-control"
            id="fOrden"
            placeholder="1"
          >
        </div>

      </div>

      <div class="form-group">
        <label class="form-label">Estado</label>

        <select class="form-control" id="fEstado">
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>

      <div class="modal-footer">

        <button class="btn btn-ghost" onclick="cerrarModal()">
          Cancelar
        </button>

        <button class="btn btn-primary" onclick="guardarNivel()">
          <i class="bi bi-floppy-fill"></i>
          Guardar
        </button>

      </div>

    </div>

  </div>

  <script type="module" src="../../controllers/nivelesController.js"></script>

</body>
</html>
