<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEA · Mi Historial Académico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../assets/css/EstudianteStyle.css">
  <link rel="stylesheet" href="../../assets/css/Historial.css">
</head>

<body>
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-top">

      <div class="logo-box">
        <i class="bi bi-mortarboard-fill"></i>
      </div>

      <div class="logo-text">
        <h2>CEA</h2>
        <span>Panel Estudiante</span>
      </div>

      <button class="sidebar-close" id="closeSidebar">
        <i class="bi bi-x-lg"></i>
      </button>

    </div>

    <!-- USER -->
    <div class="sidebar-user">

      <div class="avatar">
        <i class="bi bi-person-fill"></i>
      </div>

      <div class="user-info">
        <h4 id="sidebarNombre">Estudiante</h4>
        <span id="sidebarCarrera">Cargando...</span>
      </div>

    </div>

    <!-- MENU -->
    <nav class="sidebar-menu">

      <a href="dashboard.html">
        <i class="bi bi-grid-fill"></i>
        Dashboard
      </a>

      <a href="historial.html" class="active">
        <i class="bi bi-journal-text"></i>
        Mi Historial
      </a>

      <a href="ranking.html">
        <i class="bi bi-trophy-fill"></i>
        Ranking
      </a>

      <!-- <a href="perfil.html">
        <i class="bi bi-person-circle"></i>
        Mi Perfil
      </a>

      <a href="#">
        <i class="bi bi-bell-fill"></i>
        Notificaciones
      </a> -->
      <button class="nav-link-custom" id="btnLogout" style="width:100%;margin-top:10px;border:none;background:none">
        <i class="bi bi-box-arrow-left"></i>
        Cerrar Sesión
      </button>
      
    </nav>

  </aside>

  <!-- OVERLAY -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main id="main">
    <div class="page-content">

      <div
        style="margin-bottom:24px;animation:fadeUp .4s ease;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-size:22px;font-weight:800;letter-spacing:-.4px">Mi Historial Académico</div>
          <div style="color:var(--txt-muted);font-size:13px;margin-top:3px">Todas tus calificaciones organizadas por
            gestión</div>
        </div>
        <div style="display:flex;gap:10px">
          <!-- <select class="filter-select" id="filtroGestion" onchange="filtrar()">
            <option value="">Todas las gestiones</option>
          </select> -->
          <!-- <a href="ranking.html" class="btn btn-ghost"><i class="bi bi-trophy-fill"></i> Ranking</a> -->
        </div>
      </div>

      <!-- Resumen general -->
      <div id="resumenBanner"
        style="display:none;background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(59,130,246,.08));border-radius:var(--radius);padding:20px 24px;margin-bottom:22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;animation:fadeUp .4s ease .1s both">
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--accent-3)" id="resPromedio">—
          </div>
          <div style="font-size:11px;color:var(--txt-muted);margin-top:3px">PROMEDIO GENERAL</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--accent)" id="resAprobados">—
          </div>
          <div style="font-size:11px;color:var(--txt-muted);margin-top:3px">APROBADOS</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--danger)" id="resReprobados">—
          </div>
          <div style="font-size:11px;color:var(--txt-muted);margin-top:3px">REPROBADOS</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--accent-4)" id="resPendientes">—
          </div>
          <div style="font-size:11px;color:var(--txt-muted);margin-top:3px">PENDIENTES</div>
        </div>
      </div>

      <!-- ================= HISTORIAL ================= -->
      <div class="table-wrapper">

        <table class="historial-table">

          <thead>

            <tr>

              <th width="70">
                #
              </th>

              <th>
                Módulo
              </th>

              <th width="140">
                Nota
              </th>

              <th width="180">
                Estado
              </th>

            </tr>

          </thead>

          <!-- EL CONTROLLER INSERTA LAS FILAS AQUÍ -->
          <tbody id="historialContainer">

            <!-- LOADING -->
            <tr>

              <td colspan="4">

                <div class="empty-state">

                  <i class="bi bi-hourglass-split"></i>

                  <h3>
                    Cargando historial
                  </h3>

                  <p>
                    Espera un momento...
                  </p>

                </div>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>
  </main>
  <script type="module" src="../../controllers/sidebarController.js"></script>
  <!-- SCRIPT -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebarOverlay");

      const openBtn = document.getElementById("openSidebar");
      const closeBtn = document.getElementById("closeSidebar");

      if (openBtn) {
        openBtn.addEventListener("click", () => {
          sidebar.classList.add("active");
          overlay.classList.add("active");
        });
      }

      function cerrarSidebar() {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      }

      if (closeBtn) {
        closeBtn.addEventListener("click", cerrarSidebar);
      }

      if (overlay) {
        overlay.addEventListener("click", cerrarSidebar);
      }

    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="../../controllers/HistorialController.js"></script>
</body>

</html>
