<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEA — Módulos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>
<script src="../../assets/js/sidebar.js"></script>
<script>renderLayout({ title: 'Módulos', subtitle: 'Materias y módulos por carrera y nivel', activeLink: 'modulos' });</script>

<div id="main">
  <div class="page-content">

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px">
      <div class="stat-card">
        <div class="icon-wrap ic-blue"><i class="bi bi-journals"></i></div>
        <div class="stat-value" id="totalMod">—</div>
        <div class="stat-label">Total Módulos</div>
      </div>
      <div class="stat-card">
        <div class="icon-wrap ic-green"><i class="bi bi-check2-circle"></i></div>
        <div class="stat-value" id="activos">—</div>
        <div class="stat-label">Activos</div>
      </div>
      <div class="stat-card">
        <div class="icon-wrap ic-purple"><i class="bi bi-building"></i></div>
        <div class="stat-value" id="carrerasCount">—</div>
        <div class="stat-label">Carreras</div>
      </div>
    </div>

    <div class="panel-card">
      <div class="section-header">
        <div>
          <div class="section-title">Lista de Módulos</div>
          <div class="section-sub">Materias asignadas por carrera y nivel</div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <select class="filter-select" id="filtroCarrera" onchange="filtrar()">
            <option value="">Todas las carreras</option>
          </select>
          <select class="filter-select" id="filtroNivel" onchange="filtrar()">
            <option value="">Todos los niveles</option>
          </select>
          <select class="filter-select" id="filtroEstado" onchange="filtrar()">
            <option value="">Todos</option>
            <option value="true">Activos</option>
            <option value="false">Inactivos</option>
          </select>
          <button class="btn btn-primary" onclick="abrirModal()">
            <i class="bi bi-plus-lg"></i> Nuevo Módulo
          </button>
        </div>
      </div>

      <div style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr><th>Ord.</th><th>Módulo</th><th>Sigla</th><th>Carrera</th><th>Nivel</th><th>Estado</th><th>Acciones</th></tr>
          </thead>
          <tbody id="tbodyMod"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modalModulo">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title" id="modalTitulo">Nuevo Módulo</div>
      <button class="modal-close" onclick="cerrarModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre del Módulo</label>
      <input type="text" class="form-control" id="fNombre" placeholder="Ej: Programación I">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Sigla</label>
        <input type="text" class="form-control" id="fSigla" placeholder="PROG1">
      </div>
      <div class="form-group">
        <label class="form-label">Orden</label>
        <input type="number" class="form-control" id="fOrden" placeholder="1" min="1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Carrera</label>
        <select class="form-control" id="fCarrera">
          <option value="">Seleccionar...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Nivel</label>
        <select class="form-control" id="fNivel">
          <option value="">Seleccionar...</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Estado</label>
      <select class="form-control" id="fEstado">
        <option value="true">Activo</option>
        <option value="false">Inactivo</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()"><i class="bi bi-floppy-fill"></i> Guardar</button>
    </div>
  </div>
</div>

<script type="module">
const DEMO_CARRERAS = [
  { id:'carrera001', nombre:'Sistemas Informáticos', sigla:'SI' },
  { id:'carrera002', nombre:'Contabilidad', sigla:'CONT' },
  { id:'carrera003', nombre:'Electricidad', sigla:'ELEC' },
];
const DEMO_NIVELES = [
  { id:'nivel_1', nombre:'Técnico Básico', sigla:'TB' },
  { id:'nivel_2', nombre:'Técnico Auxiliar', sigla:'TA' },
  { id:'nivel_3', nombre:'Técnico Medio', sigla:'TM' },
];
let modulos = [
  { id:'mod1', nombre:'Introducción a la Informática', sigla:'INTRO', carreraId:'carrera001', nivelId:'nivel_1', orden:1, estado:true },
  { id:'mod2', nombre:'Programación I', sigla:'PROG1', carreraId:'carrera001', nivelId:'nivel_1', orden:2, estado:true },
  { id:'mod3', nombre:'Base de Datos I', sigla:'BD1', carreraId:'carrera001', nivelId:'nivel_2', orden:1, estado:true },
  { id:'mod4', nombre:'Redes y Telecomunicaciones', sigla:'REDES', carreraId:'carrera001', nivelId:'nivel_2', orden:2, estado:true },
  { id:'mod5', nombre:'Contabilidad Básica', sigla:'CONT1', carreraId:'carrera002', nivelId:'nivel_1', orden:1, estado:true },
  { id:'mod6', nombre:'Electricidad Básica', sigla:'ELEC1', carreraId:'carrera003', nivelId:'nivel_1', orden:1, estado:false },
  { id:'mod7', nombre:'Programación II', sigla:'PROG2', carreraId:'carrera001', nivelId:'nivel_3', orden:1, estado:true },
];
const carreras = {}, niveles = {};
DEMO_CARRERAS.forEach(c=>carreras[c.id]=c);
DEMO_NIVELES.forEach(n=>niveles[n.id]=n);
let editId = null;

function init() {
  document.getElementById('totalMod').textContent = modulos.length;
  document.getElementById('activos').textContent = modulos.filter(m=>m.estado).length;
  document.getElementById('carrerasCount').textContent = new Set(modulos.map(m=>m.carreraId)).size;

  const selFC = document.getElementById('filtroCarrera');
  const selFN = document.getElementById('filtroNivel');
  const selC  = document.getElementById('fCarrera');
  const selN  = document.getElementById('fNivel');
  DEMO_CARRERAS.forEach(c => { selFC.insertAdjacentHTML('beforeend',`<option value="${c.id}">${c.nombre}</option>`); selC.insertAdjacentHTML('beforeend',`<option value="${c.id}">${c.nombre}</option>`); });
  DEMO_NIVELES.forEach(n => { selFN.insertAdjacentHTML('beforeend',`<option value="${n.id}">${n.nombre}</option>`); selN.insertAdjacentHTML('beforeend',`<option value="${n.id}">${n.nombre}</option>`); });
  renderTabla();
}

function getFiltrados() {
  const fc = document.getElementById('filtroCarrera').value;
  const fn = document.getElementById('filtroNivel').value;
  const fe = document.getElementById('filtroEstado').value;
  return modulos.filter(m =>
    (!fc || m.carreraId===fc) &&
    (!fn || m.nivelId===fn) &&
    (fe==='' || String(m.estado)===fe)
  ).sort((a,b)=>a.orden-b.orden);
}

function renderTabla() {
  const data = getFiltrados();
  const tbody = document.getElementById('tbodyMod');
  if (!data.length) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--txt-muted)">Sin módulos</td></tr>`; return; }
  tbody.innerHTML = data.map(m => {
    const c = carreras[m.carreraId]||{};
    const n = niveles[m.nivelId]||{};
    return `<tr>
      <td><span style="font-family:var(--mono);color:var(--accent-4)">#${m.orden}</span></td>
      <td class="td-name">${m.nombre}</td>
      <td><span class="role-badge rb-admin" style="font-family:var(--mono)">${m.sigla}</span></td>
      <td><span class="role-badge rb-dir">${c.sigla||'—'}</span> ${c.nombre||'—'}</td>
      <td>${n.nombre||'—'} <span style="font-size:10px;color:var(--txt-muted)">(${n.sigla||''})</span></td>
      <td>
        <button onclick="toggleEstado('${m.id}')" style="background:none;border:none;cursor:pointer">
          <span class="status-dot ${m.estado?'active':'inactive'}">${m.estado?'Activo':'Inactivo'}</span>
        </button>
      </td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="editar('${m.id}')"><i class="bi bi-pencil-fill"></i></button>
          <button class="btn btn-danger btn-sm" onclick="eliminar('${m.id}')"><i class="bi bi-trash-fill"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('totalMod').textContent = modulos.length;
  document.getElementById('activos').textContent = modulos.filter(m=>m.estado).length;
}

window.filtrar = renderTabla;
window.abrirModal = function(id=null) {
  editId = id;
  document.getElementById('modalTitulo').textContent = id ? 'Editar Módulo' : 'Nuevo Módulo';
  if (id) {
    const m = modulos.find(x=>x.id===id);
    document.getElementById('fNombre').value=m.nombre;
    document.getElementById('fSigla').value=m.sigla;
    document.getElementById('fOrden').value=m.orden;
    document.getElementById('fCarrera').value=m.carreraId;
    document.getElementById('fNivel').value=m.nivelId;
    document.getElementById('fEstado').value=String(m.estado);
  } else {
    ['fNombre','fSigla','fOrden'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('fCarrera').value='';
    document.getElementById('fNivel').value='';
    document.getElementById('fEstado').value='true';
  }
  document.getElementById('modalModulo').classList.add('show');
};
window.cerrarModal = () => document.getElementById('modalModulo').classList.remove('show');
window.editar = id => abrirModal(id);
window.guardar = function() {
  const data = {
    nombre: document.getElementById('fNombre').value.trim(),
    sigla: document.getElementById('fSigla').value.trim().toUpperCase(),
    orden: parseInt(document.getElementById('fOrden').value)||1,
    carreraId: document.getElementById('fCarrera').value,
    nivelId: document.getElementById('fNivel').value,
    estado: document.getElementById('fEstado').value==='true',
  };
  if (!data.nombre||!data.sigla||!data.carreraId||!data.nivelId) { showToast('Completa todos los campos','error'); return; }
  if (editId) { const i=modulos.findIndex(m=>m.id===editId); if(i>-1) modulos[i]={...modulos[i],...data}; showToast('Módulo actualizado'); }
  else { modulos.push({id:'mod'+Date.now(),...data}); showToast('Módulo registrado'); }
  cerrarModal(); renderTabla();
};
window.eliminar = function(id) {
  if(!confirm('¿Eliminar módulo?')) return;
  modulos=modulos.filter(m=>m.id!==id); showToast('Eliminado','info'); renderTabla();
};
window.toggleEstado = function(id) {
  const i=modulos.findIndex(m=>m.id===id);
  if(i>-1) { modulos[i].estado=!modulos[i].estado; showToast(`Módulo ${modulos[i].estado?'activado':'desactivado'}`,'info'); renderTabla(); }
};

init();
</script>
</body>
</html>
