      <!-- <a href="perfil.html">

    <i class="bi bi-list"></i>

  <main id="main">
    <!-- TOPBAR -->
    <header class="topbar">

      <button class="menu-btn" id="openSidebar">
        <i class="bi bi-list"></i>
      </button>

      <div class="topbar-title">
        <div style="font-size:22px;font-weight:800;letter-spacing:-.4px">Mi Historial Académico</div>
          <div style="color:var(--txt-muted);font-size:13px;margin-top:3px">Todas tus calificaciones organizadas por
            gestión
          </div>
      </div>

    </header>
    <div class="page-content">

      <div
        style="margin-bottom:24px;animation:fadeUp .4s ease;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        
        <div style="display:flex;gap:10px">
          <!-- <select class="filter-select" id="filtroGestion" onchange="filtrar()">
            <option value="">Todas las gestiones</option>
          </select> -->
          <!-- <a href="ranking.html" class="btn btn-ghost"><i class="bi bi-trophy-fill"></i> Ranking</a> -->
        </div>
      </div>

      <!-- Resumen general -->
      <div id="resumenBanner"
        style="display:none;background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(59,130,246,.08));border-radius:var(--radius);padding:20px 24px;margin-bottom:22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;animation:fadeUp .4s ease .1s both">
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--accent-3)" id="resPromedio">—
          </div>
          <div style="font-size:11px;color:var(--txt-muted);margin-top:3px">PROMEDIO GENERAL</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--accent)" id="resAprobados">—
          </div>
          <div style="font-size:11px;color:var(--txt-muted);margin-top:3px">APROBADOS</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--danger)" id="resReprobados">—
          </div>
          <div style="font-size:11px;color:var(--txt-muted);margin-top:3px">REPROBADOS</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--accent-4)" id="resPendientes">—

          <div style="font-size:11px;color:var(--txt-muted);margin-top:3px">PENDIENTES</div>
        </div>
      </div>

      <!-- ================= HISTORIAL ================= -->
      <div class="table-wrapper">

        <table class="historial-table">

          <thead>

            <tr>

              <th width="70">

              <th>
                Módulo
              </th>

              <th width="140">

              </th>

              <th width="180">
                Estado
              </th>

            </tr>

          </thead>

          <!-- EL CONTROLLER INSERTA LAS FILAS AQUÍ -->
          <tbody id="historialContainer">

            <!-- LOADING -->
            <tr>

              <td colspan="4">

                <div class="empty-state">

                  <i class="bi bi-hourglass-split"></i>

                  <h3>
                    Cargando historial
                  </h3>

                  <p>
                    Espera un momento...
                  </p>

                </div>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>
  </main>
  <script type="module" src="../../controllers/sidebarController.js"></script>
  <!-- SCRIPT -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebarOverlay");

      const openBtn = document.getElementById("openSidebar");
      const closeBtn = document.getElementById("closeSidebar");

      if (openBtn) {
        openBtn.addEventListener("click", () => {
          sidebar.classList.add("active");
          overlay.classList.add("active");
        });
      }

      function cerrarSidebar() {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      }

      if (closeBtn) {
        closeBtn.addEventListener("click", cerrarSidebar);
      }

      if (overlay) {
        overlay.addEventListener("click", cerrarSidebar);
      }

    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="../../controllers/HistorialController.js"></script>

</body>
