<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEA · Mis Niveles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../assets/css/DocenteStyle.css">
</head>
<style>
  /* =========================
   SIDEBAR
========================= */

  #sidebar {

    position: fixed;

    top: 0;
    left: 0;
    bottom: 0;

    width: 260px;

    height: 100vh;

    background: var(--bg-surface);

    border-right: 1px solid var(--border);

    display: flex;

    flex-direction: column;

    overflow: hidden;

    z-index: 1000;

    transition: transform .3s ease;

  }

  /* =========================
   CONTENIDO INTERNO
========================= */

  .sidebar-content {

    flex: 1;

    overflow-y: auto;

    overflow-x: hidden;

    padding-bottom: 20px;

  }

  /* Scroll elegante */

  .sidebar-content::-webkit-scrollbar {

    width: 5px;

  }

  .sidebar-content::-webkit-scrollbar-thumb {

    background: var(--border);

    border-radius: 20px;

  }

  /* =========================
   BRAND
========================= */

  .sidebar-brand {

    display: flex;

    align-items: center;

    gap: 12px;

    padding: 22px;

    border-bottom: 1px solid var(--border);

    text-decoration: none;

    flex-shrink: 0;

  }

  /* =========================
   FOOTER
========================= */

  .sidebar-footer {

    padding: 14px;

    border-top: 1px solid var(--border);

    background: var(--bg-surface);

    flex-shrink: 0;

  }

  /* =========================
   MAIN
========================= */

  #main {

    margin-left: 260px;

    min-height: 100vh;

    transition: margin-left .3s ease;

  }

  /* =========================
   TOPBAR
========================= */

  #topbar {

    position: fixed;

    top: 0;
    left: 260px;
    right: 0;

    height: 68px;

    background: var(--bg-surface);

    border-bottom: 1px solid var(--border);

    display: flex;

    align-items: center;

    padding: 0 24px;

    z-index: 900;

    transition: left .3s ease;

  }

  /* =========================
   RESPONSIVE
========================= */

  .hamburger {

    display: none;

  }

  #sidebar-overlay {

    position: fixed;

    inset: 0;

    background: rgba(0, 0, 0, .65);

    backdrop-filter: blur(2px);

    z-index: 999;

    opacity: 0;

    visibility: hidden;

    transition: .25s;

  }

  /* =========================
   TABLET Y MOVIL
========================= */

  @media(max-width:991px) {

    #sidebar {

      transform: translateX(-100%);

      width: 270px;

      box-shadow: 0 10px 40px rgba(0, 0, 0, .55);

    }

    #sidebar.open {

      transform: translateX(0);

    }

    #sidebar-overlay.show {

      opacity: 1;

      visibility: visible;

    }

    #main {

      margin-left: 0;

    }

    #topbar {

      left: 0;

    }

    .hamburger {

      display: flex;

      align-items: center;

      justify-content: center;

      width: 40px;

      height: 40px;

      margin-right: 12px;

      border-radius: 10px;

      border: 1px solid var(--border);

      background: transparent;

      color: var(--txt-primary);

      font-size: 20px;

      cursor: pointer;

    }

  }

  /* =========================
   CELULAR
========================= */

  @media(max-width:576px) {

    #sidebar {

      width: 85%;

      max-width: 320px;

    }

    .page-content {

      padding: 15px;

    }

  }
</style>

<body>
  <!-- SIDEBAR -->
  <aside id="sidebar">

    <!-- LOGO -->
    <a href="dashboard.html" class="sidebar-brand">

      <div class="brand-icon">
        <i class="bi bi-mortarboard-fill"></i>
      </div>

      <div class="brand-text">
        <div class="name">CEA Docente</div>
        <div class="sub">Sistema Académico</div>
      </div>

    </a>

    <!-- MENU -->
    <div class="nav-section">

      <div class="nav-section-label">
        Principal
      </div>

      <div class="nav-item-wrap">

        <a href="dashboard.html" class="nav-link-custom">

          <i class="bi bi-grid-1x2-fill"></i>
          <span>Dashboard</span>

        </a>

        <a href="niveles.html" class="nav-link-custom active">

          <i class="bi bi-layers-fill"></i>
          <span>Mis Niveles</span>

        </a>

        <a href="subirNotas.html" class="nav-link-custom">

          <i class="bi bi-pencil-square"></i>
          <span>Subir Notas</span>

        </a>

      </div>

    </div>

    <!-- ACADEMICO -->
    <div class="nav-section">

      <div class="nav-section-label">
        Académico
      </div>

      <div class="nav-item-wrap">

        <a href="#" class="nav-link-custom">

          <i class="bi bi-journals"></i>
          <span>Módulos</span>

        </a>

        <a href="#" class="nav-link-custom">

          <i class="bi bi-people-fill"></i>
          <span>Estudiantes</span>

        </a>
        <button class="nav-link-custom" id="btnLogout" style="width:100%;margin-top:10px;border:none;background:none">
          <i class="bi bi-box-arrow-left"></i>
          <span>Cerrar Sesión</span>
        </button>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="sidebar-footer">

      <div class="user-card">

        <div class="user-avatar" id="avatarDocente">
          D
        </div>

        <div class="user-info">

          <div class="uname" id="nombreDocente">
            Docente
          </div>

          <div class="urole">
            Rol Docente
          </div>
        </div>
      </div>
    </div>

  </aside>

  <!-- OVERLAY -->
  <div id="sidebar-overlay"></div>

  <!-- TOPBAR -->
  <header id="topbar">

    <!-- MENU -->
    <button class="hamburger" id="btnMenu">

      <i class="bi bi-list"></i>

    </button>

    <!-- TITLE -->
    <div>

      <div class="topbar-title">

        Panel Docente

      </div>

      <div class="topbar-sub">

        Centro de Educación Alternativa

      </div>

    </div>

    <!-- SEARCH -->
    <div class="topbar-search">

      <i class="bi bi-search"></i>

      <input type="text" placeholder="Buscar...">

    </div>

    <!-- ACTIONS -->
    <div class="topbar-actions">

      <button class="icon-btn">

        <i class="bi bi-bell"></i>

        <span class="dot"></span>

      </button>

    </div>

  </header>
  <div id="main">
    <div class="page-content">

      <!-- Header info -->
      <div style="margin-bottom:24px;animation:fadeUp .4s ease">
        <div style="font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px">Mis Niveles Asignados</div>
        <div style="color:var(--txt-muted);font-size:13px">Niveles y carreras donde tienes clases asignadas</div>
      </div>

      <!-- Grid niveles -->
      <div id="nivelesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px">
        <div class="empty-state" style="grid-column:1/-1"><i class="bi bi-hourglass-split"></i>
          <p>Cargando niveles...</p>
        </div>
      </div>

    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="../../controllers/NivelesDocController.js"></script>
  
  <script>
    // SIDEBAR RESPONSIVE

    const sidebar = document.getElementById("sidebar");

    const overlay = document.getElementById("sidebar-overlay");

    const btnMenu = document.getElementById("btnMenu");

    btnMenu.addEventListener("click", () => {

      sidebar.classList.toggle("open");

      overlay.classList.toggle("show");

    });

    overlay.addEventListener("click", () => {

      sidebar.classList.remove("open");

      overlay.classList.remove("show");

    });
  </script>
</body>

</html>
