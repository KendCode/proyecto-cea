<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>404 | CEA Abya Yala</title>


  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
    rel="stylesheet">


  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


  <style>
    :root {

      --bg-base: #0d1117;
      --bg-card: #161b22;
      --bg-elevated: #1f2937;

      --border: #2d3748;

      --accent: #3b82f6;
      --purple: #8b5cf6;
      --green: #10b981;

      --text: #f1f5f9;
      --muted: #94a3b8;

    }


    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    body {

      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'Plus Jakarta Sans', sans-serif;

      background:
        radial-gradient(circle at top,
          rgba(59, 130, 246, .18),
          transparent 40%),
        var(--bg-base);

      color: var(--text);

      overflow: hidden;

    }



    /* TARJETA */

    .error-card {


      width: 420px;

      background: var(--bg-card);

      border: 1px solid var(--border);

      border-radius: 20px;

      padding: 40px 35px;

      text-align: center;

      box-shadow:
        0 20px 60px rgba(0, 0, 0, .5);


      animation: entrada .5s ease;


    }



    /* ICONO */

    .error-icon {


      width: 110px;
      height: 110px;


      margin: auto;
      margin-bottom: 25px;


      border-radius: 50%;


      display: grid;
      place-items: center;


      font-size: 55px;


      background:
        linear-gradient(135deg,
          var(--accent),
          var(--purple));


      color: white;


      box-shadow:
        0 0 35px rgba(59, 130, 246, .4);


    }



    h1 {


      font-size: 80px;

      font-weight: 800;

      line-height: 1;

      background:
        linear-gradient(90deg,
          var(--accent),
          var(--purple));


      -webkit-background-clip: text;

      color: transparent;


    }



    h2 {

      font-size: 22px;

      margin-top: 10px;

    }


    p {


      margin-top: 15px;

      color: var(--muted);

      font-size: 14px;

      line-height: 1.6;


    }



    /* BOTON */


    .btn-home {


      display: inline-flex;

      align-items: center;

      gap: 10px;


      margin-top: 30px;


      padding: 12px 25px;


      border-radius: 10px;


      text-decoration: none;


      background: var(--accent);


      color: white;


      font-weight: 700;


      transition: .3s;


    }


    .btn-home:hover {


      transform: translateY(-3px);


      box-shadow:
        0 0 20px rgba(59, 130, 246, .5);


    }



    /* FOOTER */


    .footer {


      margin-top: 30px;


      padding-top: 20px;


      border-top:
        1px solid var(--border);


      font-size: 12px;


      color: var(--muted);


    }


    .version {


      margin-top: 8px;


      color: #64748b;


    }



    @keyframes entrada {


      from {

        opacity: 0;

        transform: translateY(30px);

      }


      to {

        opacity: 1;

        transform: translateY(0);

      }


    }
  </style>

</head>



<body>


  <div class="error-card">


    <div class="error-icon">

      <i class="bi bi-exclamation-triangle-fill"></i>

    </div>


    <h1>404</h1>


    <h2>Página no encontrada</h2>


    <p>

      La página que estás buscando no existe
      o fue movida dentro del sistema CEA Abya Yala.

    </p>



    <a href="index.html" class="btn-home">

      <i class="bi bi-house-fill"></i>

      Volver al inicio

    </a>




    <div class="footer">

      <i class="bi bi-shield-lock-fill"></i>

      Sistema académico CEA Abya Yala


      <div class="version">

        Versión 1.5.0

        <br>

        Desarrollado por <b>KendCode</b>

      </div>


    </div>


  </div>



</body>

</html>
