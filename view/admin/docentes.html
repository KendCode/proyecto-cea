<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEA — Docentes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>

<body>
  <script src="../../assets/js/sidebar.js"></script>
  <script>renderLayout({ title: 'Docentes', subtitle: 'Gestión del cuerpo docente', activeLink: 'docentes' });</script>

  <div id="main">
    <div class="page-content">

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px">
        <div class="stat-card">
          <div class="icon-wrap ic-green"><i class="bi bi-person-workspace"></i></div>
          <div class="stat-value" id="totalDoc">—</div>
          <div class="stat-label">Total Docentes</div>
          <span class="stat-change up"><i class="bi bi-arrow-up-short"></i> Activos</span>
        </div>
        <div class="stat-card">
          <div class="icon-wrap ic-blue"><i class="bi bi-building"></i></div>
          <div class="stat-value" id="carrerasDoc">—</div>
          <div class="stat-label">Carreras Cubiertas</div>
        </div>
        <div class="stat-card">
          <div class="icon-wrap ic-purple"><i class="bi bi-layers-fill"></i></div>
          <div class="stat-value" id="nivelesDoc">—</div>
          <div class="stat-label">Niveles</div>
        </div>
      </div>

      <div class="panel-card">
        <div class="section-header">
          <div>
            <div class="section-title">Lista de Docentes</div>
            <div class="section-sub">Docentes asignados a carreras y niveles</div>
          </div>
          <div style="display:flex;gap:10px">
            <select class="filter-select" id="filtroCarrera" onchange="renderTabla()">
              <option value="">Todas las carreras</option>
            </select>
            <button class="btn btn-primary" onclick="abrirModal()">
              <i class="bi bi-plus-lg"></i> Nuevo Docente
            </button>
          </div>
        </div>

        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Docente</th>
                <th>CI</th>
                <th>Celular</th>
                <th>Carrera</th>
                <th>Nivel</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbodyDoc"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalDocente">
    <div class="modal" style="max-width:580px">
      <div class="modal-header">
        <div class="modal-title" id="modalTitulo">Nuevo Docente</div>
        <button class="modal-close" onclick="cerrarModal()"><i class="bi bi-x-lg"></i></button>
      </div>
      <div
        style="color:var(--txt-muted);font-size:12px;margin-bottom:16px;background:var(--bg-elevated);border-radius:var(--radius-sm);padding:10px 14px">
        <i class="bi bi-info-circle"></i> El docente debe tener un <strong style="color:var(--txt-primary)">usuario con
          rol "docente"</strong> ya creado.
      </div>
      <div class="form-group">
        <label class="form-label">Docente</label>

        <select class="form-control" id="fUsuarioId">
          <option value="">Seleccionar docente...</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Carrera</label>
          <select class="form-control" id="fCarrera">
            <option value="">Seleccionar...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Nivel</label>
          <select class="form-control" id="fNivel">
            <option value="">Seleccionar...</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardar()"><i class="bi bi-floppy-fill"></i> Guardar</button>
      </div>
    </div>
  </div>
  <script type="module" src="../../controllers/docentesController.js">
  </script>
</body>

</html>
