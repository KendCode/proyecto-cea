<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEA · Mis Niveles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../assets/css/DocenteStyle.css">
</head>
<body>
<div id="main">
  <div class="page-content">

    <!-- Header info -->
    <div style="margin-bottom:24px;animation:fadeUp .4s ease">
      <div style="font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px">Mis Niveles Asignados</div>
      <div style="color:var(--txt-muted);font-size:13px">Niveles y carreras donde tienes clases asignadas</div>
    </div>

    <!-- Grid niveles -->
    <div id="nivelesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px">
      <div class="empty-state" style="grid-column:1/-1"><i class="bi bi-hourglass-split"></i><p>Cargando niveles...</p></div>
    </div>

  </div>
</div>

<script src="../../assets/js/sidebar.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { /* ← tu config */ };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

renderLayout({ title: 'Mis Niveles', subtitle: 'Niveles y módulos asignados', activeLink: 'niveles', role: 'docente' });

const PALETA = [
  { bg: 'rgba(59,130,246,.15)', color: 'var(--accent)',   icon: 'bi-layers-fill' },
  { bg: 'rgba(139,92,246,.15)', color: 'var(--accent-2)', icon: 'bi-mortarboard-fill' },
  { bg: 'rgba(16,185,129,.15)', color: 'var(--accent-3)', icon: 'bi-award-fill' },
  { bg: 'rgba(245,158,11,.15)', color: 'var(--accent-4)', icon: 'bi-star-fill' },
];

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '../auth/login.html'; return; }
  await cargarNiveles(user.uid);
});

async function cargarNiveles(uid) {
  const grid = document.getElementById('nivelesGrid');
  try {
    const q = query(collection(db, 'docentes'), where('usuarioId', '==', uid));
    const snap = await getDocs(q);

    if (snap.empty) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="bi bi-layers"></i><p>No tienes niveles asignados</p></div>';
      return;
    }

    const asignaciones = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    let html = '';

    for (let i = 0; i < asignaciones.length; i++) {
      const asi = asignaciones[i];
      const pal = PALETA[i % PALETA.length];

      const nivelId = typeof asi.nivelId === 'string' ? asi.nivelId.split('/').pop() : '';
      const carreraId = typeof asi.carreraId === 'string' ? asi.carreraId.split('/').pop() : '';

      const [nivelSnap, carreraSnap] = await Promise.all([
        getDoc(doc(db, 'niveles', nivelId)),
        getDoc(doc(db, 'carreras', carreraId))
      ]);

      const nivel   = nivelSnap.exists()   ? nivelSnap.data()   : { nombre: 'Nivel ?', sigla: '?' };
      const carrera = carreraSnap.exists() ? carreraSnap.data() : { nombre: 'Carrera ?', sigla: '?' };

      // Módulos de este nivel + carrera
      const mQ = query(collection(db, 'modulos'),
        where('carreraId', '==', asi.carreraId),
        where('nivelId', '==', asi.nivelId),
        where('estado', '==', true));
      const mSnap = await getDocs(mQ);
      const modulos = mSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.orden||0) - (b.orden||0));

      // Estudiantes
      const eQ = query(collection(db, 'estudiantes'), where('nivel', '==', asi.nivelId));
      const eSnap = await getDocs(eQ);

      html += `
        <div class="panel-card" style="animation-delay:${i*0.08}s">
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
            <div style="width:46px;height:46px;border-radius:12px;background:${pal.bg};display:grid;place-items:center;color:${pal.color};font-size:20px;flex-shrink:0">
              <i class="bi ${pal.icon}"></i>
            </div>
            <div>
              <div style="font-weight:800;font-size:15px;color:var(--txt-primary)">${nivel.nombre}</div>
              <div style="font-size:11.5px;color:var(--txt-muted)">${carrera.nombre} · <span style="color:${pal.color}">${carrera.sigla}</span></div>
            </div>
            <div style="margin-left:auto;text-align:right">
              <div style="font-size:22px;font-weight:800;color:${pal.color}">${eSnap.size}</div>
              <div style="font-size:10px;color:var(--txt-muted)">estudiantes</div>
            </div>
          </div>

          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txt-muted);margin-bottom:10px">
            Módulos (${modulos.length})
          </div>

          ${modulos.length ? modulos.map((m, mi) => `
            <div style="display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);background:var(--bg-elevated);margin-bottom:6px">
              <div style="width:22px;height:22px;border-radius:5px;background:${pal.bg};display:grid;place-items:center;color:${pal.color};font-size:11px;font-weight:800;flex-shrink:0">${m.orden||mi+1}</div>
              <div style="flex:1">
                <div style="font-weight:600;font-size:12.5px;color:var(--txt-primary)">${m.nombre}</div>
                <div style="font-size:10.5px;color:var(--txt-muted)">${m.sigla||''}</div>
              </div>
              <a href="subirNotas.html?moduloId=${m.id}" class="btn btn-sm btn-ghost" style="padding:4px 9px;font-size:11px">
                <i class="bi bi-pencil"></i> Notas
              </a>
            </div>`).join('') : `<div style="text-align:center;padding:20px;color:var(--txt-muted);font-size:12px"><i class="bi bi-journal-x" style="font-size:24px;display:block;margin-bottom:8px;opacity:.4"></i>Sin módulos</div>`}

          <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:8px">
            <a href="subirNotas.html?nivelId=${nivelId}&carreraId=${carreraId}" class="btn btn-sm btn-primary" style="flex:1;justify-content:center">
              <i class="bi bi-star-fill"></i> Subir Notas
            </a>
          </div>
        </div>`;
    }

    grid.innerHTML = html;
  } catch (err) {
    console.error(err);
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="bi bi-exclamation-triangle"></i><p>Error al cargar: ${err.message}</p></div>`;
    showToast('Error al cargar niveles', 'error');
  }
}
</script>
</body>
</html>
